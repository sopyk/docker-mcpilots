{% extends "base.html" %}
{% block title %}登录 - Docker-MCPilotS{% endblock %}

{% block navbar %}{% endblock %}

{% block body %}
<div class="login-card">
    <img src="/ui/static/assets/logo.jpg" alt="Docker-MCPilotS Logo" style="width: 120px; height: auto; border-radius: 16px; margin: 0 auto 16px auto; display: block;">
    <h1><span class="status-dot"></span>Docker-MCPilotS</h1>
    <p style="color: var(--text-muted); text-align: center; margin-bottom: 24px; font-size: 15px;">给 Agent 一双管理 Docker 的手</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    {% if success %}<p class="success" style="color:#4ade80;margin-bottom:12px;text-align:center;">{{ success }}</p>{% endif %}
    <form method="post" action="/ui/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" required>
        </div>
        <button type="submit">登录</button>
    </form>
</div>
{% endblock %}
