# Docker-MCPilotS MCP Server 配置文件
# 将此文件复制到 /app/config/settings.yaml 后编辑

server:
  host: "0.0.0.0"
  port: 8900
  log_level: "info"  # debug / info / warning / error
  host_origin_protection: false  # Host 头保护，默认关闭。如需开启请同时配置 allowed_hosts 白名单，避免反代或内网访问被拦截
  allowed_hosts: []  # 允许的 Host 域名列表，如 ["example.com", "nas.local"]

docker:
  socket_path: "/var/run/docker.sock"  # 通常不需要修改

features:
  container_management: true
  image_management: true
  system_diagnostics: true
  exec_enabled: false  # 容器内执行命令（高风险，仅 admin 可用，建议配合 scope 限制特定容器）

web:
  csrf_secret: "change-me-please"
  session_timeout: 28800
