# 群晖 NAS 部署（使用预构建镜像 + PUID/PGID 权限调整）
# 适用：群晖 NAS Container Manager 图形化部署
# 用法：
#   1. 把整个 docker/nas/ 目录上传到 NAS（例如 /volume1/docker/dm/）
#   2. 在 nas/ 同级创建 config/ 和 secrets/ 目录
#   3. 群晖 Container Manager → 项目 → 创建 → 选这个目录，会自动识别 docker-compose.yml
#   4. 按需修改 PUID/PGID 匹配你的 DSM 用户（id 命令查看）
services:
  docker-mcp-server:
    image: docker-mcp-server:v0.1.4
    container_name: docker-mcp-server
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config:/app/config
      - ./secrets:/app/secrets
    environment:
      - TZ=Asia/Shanghai
      - MCP_CONFIG_DIR=/app/config
      - MCP_SECRETS_DIR=/app/secrets
      # 群晖 DSM 默认管理员 UID=1026, GID=100
      # 用 id 命令查看你的实际用户，按需修改
      - PUID=1026
      - PGID=100
