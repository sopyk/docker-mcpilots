# Docker 部署（使用预构建镜像 + PUID/PGID 权限调整）
# 适用：群晖/威联通等 NAS、普通 Linux 服务器
# 镜像地址二选一：
#   - GHCR: ghcr.io/sopyk/docker-mcpilots:latest
#   - Docker Hub: sopyk/docker-mcpilots:latest
# 用法：
#   1. 创建项目目录，把这个文件重命名为 docker-compose.yml
#   2. 在同级创建 config/ 和 secrets/ 目录
#   3. 复制配置模板到对应目录
#   4. docker compose up -d
services:
  docker-mcpilots:
    image: ghcr.io/sopyk/docker-mcpilots:latest
    container_name: docker-mcpilots
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./secrets:/app/secrets
    environment:
      - TZ=Asia/Shanghai
      - MCP_CONFIG_DIR=/app/config
      - MCP_SECRETS_DIR=/app/secrets
      # 群晖 DSM 默认管理员 UID=1026, GID=100
      # 其他系统用 id 命令查看你的实际用户，按需修改
      - PUID=1026
      - PGID=100
