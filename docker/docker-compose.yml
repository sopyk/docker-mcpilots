# Docker 部署（使用预构建镜像 + PUID/PGID 权限调整）
# 适用：群晖/威联通等 NAS、普通 Linux 服务器
# 镜像地址二选一：
#   - GHCR: ghcr.io/sopyk/docker-mcpilots:latest
#   - Docker Hub: sopyk/docker-mcpilots:latest
# 用法：
#   1. 创建项目目录，把这个文件重命名为 docker-compose.yml
#   2. 在同级创建 config/ 和 secrets/ 目录
#   3. 复制配置模板到对应目录
#   4. docker compose up -d
services:
  docker-mcpilots:
    image: ghcr.io/sopyk/docker-mcpilots:latest
    container_name: docker-mcpilots
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config:/app/config
      - ./secrets:/app/secrets
    environment:
      # 时区
      - TZ=Asia/Shanghai
      # 配置目录（通常不需要修改）
      - MCP_CONFIG_DIR=/app/config
      - MCP_SECRETS_DIR=/app/secrets
      # 文件权限（群晖 DSM 默认管理员 UID=1026, GID=100，其他系统用 id 命令查看）
      - PUID=1026
      - PGID=100
      # Web UI 管理员密码（首次启动时设置，后续修改请用 Web UI）
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change-me
      # 初始 API Key（格式：name1:key1:role1,name2:key2:role2，可选）
      # - INITIAL_API_KEYS=default-admin:sk-dm-your-key:admin
